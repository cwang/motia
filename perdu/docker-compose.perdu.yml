version: '3.8'

services:
  # PostgreSQL for perdu persistence
  perdu-postgres:
    image: postgres:15
    container_name: motia-perdu-postgres
    environment:
      POSTGRES_USER: motia
      POSTGRES_PASSWORD: motia_perdu
      POSTGRES_DB: motia_perdu
    ports:
      - "5433:5432"  # Use different port to avoid conflicts
    volumes:
      - perdu_postgres_data:/var/lib/postgresql/data
      - ./scripts/init-perdu-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - perdu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motia -d motia_perdu"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  perdu_postgres_data:
    driver: local

networks:
  perdu-network:
    driver: bridge