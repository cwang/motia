# FORK-ISOLATED WORKFLOW
# This workflow is specific to our fork and will NOT interfere with upstream motia.dev CI
# It only triggers on perdu-specific changes and maintains complete isolation
# Safe for frequent upstream syncing without conflicts

name: Perdu CI (Fork-Isolated)

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
    paths:
      - 'perdu/**'
      - '.github/workflows/perdu-*.yml'
      - '.github/actions/setup-perdu/**'
  push:
    branches:
      - main
    paths:
      - 'perdu/**'
      - '.github/workflows/perdu-*.yml'
      - '.github/actions/setup-perdu/**'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output'
        required: false
        default: 'false'
        type: boolean

jobs:
  perdu-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    services:
      # PostgreSQL for perdu integration tests
      perdu-postgres:
        image: postgres:15
        env:
          POSTGRES_USER: motia
          POSTGRES_PASSWORD: motia_perdu
          POSTGRES_DB: motia_perdu_dev
          POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
        options: >-
          --health-cmd "pg_isready -U motia -d motia_perdu_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
          
      # Redis for existing motia.dev tests (unchanged)
      redis:
        image: redis/redis-stack:latest
        env:
          REDIS_ARGS: --requirepass pingpong
        options: >-
          --health-cmd "redis-cli --raw incr ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      CI: true
      NODE_ENV: test
      # Perdu environment variables
      PERDU_DB_HOST: localhost
      PERDU_DB_PORT: 5433
      PERDU_DB_USER: motia
      PERDU_DB_PASSWORD: motia_perdu
      PERDU_DB_NAME: motia_perdu_dev
      PERDU_DB_TEST: motia_perdu_test
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup perdu environment
        uses: ./.github/actions/setup-perdu
        
      - name: Initialize perdu databases
        run: |
          # Wait for PostgreSQL to be ready
          until pg_isready -h localhost -p 5433 -U motia -d motia_perdu_dev; do
            echo "Waiting for PostgreSQL to be ready..."
            sleep 2
          done
          
          # Run perdu database initialization
          PGPASSWORD=motia_perdu psql -h localhost -p 5433 -U motia -d motia_perdu_dev -f perdu/scripts/init-perdu-postgres.sql
          
      - name: Verify perdu database setup
        run: |
          cd perdu
          chmod +x scripts/test-perdu-connection.sh
          PERDU_DB_PORT=5433 ./scripts/test-perdu-connection.sh
          
      - name: Install perdu dependencies
        run: |
          cd perdu
          npm install
          
      - name: Run perdu unit tests
        run: |
          # This will be implemented in later PRs
          echo "✅ Perdu unit tests will be added in implementation PRs"
          
      - name: Run perdu integration tests
        run: |
          # This will be implemented in later PRs
          echo "✅ Perdu integration tests will be added in implementation PRs"
          
      - name: Verify perdu Docker Compose setup
        run: |
          cd perdu
          # Test that perdu docker-compose doesn't conflict with CI services
          docker compose -f docker-compose.perdu.yml config
          echo "✅ Perdu Docker Compose configuration is valid"

  perdu-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup perdu environment
        uses: ./.github/actions/setup-perdu
        
      - name: Verify fork isolation
        run: |
          echo "🔍 Verifying perdu changes are completely isolated from upstream..."
          
          # Check that changes are only in perdu directory or perdu-specific CI files
          # Use different approaches for PR vs push events
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed_files=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }})
          else
            changed_files=$(git diff --name-only HEAD~1 HEAD)
          fi
          echo "Changed files: $changed_files"
          
          # Allow only perdu/* and perdu-specific CI files
          for file in $changed_files; do
            if [[ ! "$file" =~ ^perdu/ ]] && [[ ! "$file" =~ ^\.github/workflows/perdu- ]] && [[ ! "$file" =~ ^\.github/actions/setup-perdu/ ]]; then
              echo "❌ ERROR: Non-perdu file modified: $file"
              echo "This violates fork isolation - perdu changes must be completely self-contained"
              exit 1
            fi
          done
          
          # Ensure no critical upstream files were modified
          if echo "$changed_files" | grep -E '^(compose\.yml|playground/\.env\.example|MONOREPO-README\.md|\.github/workflows/(motia|e2e-tests|deploy|create-tag|finalize|rollback))'; then
            echo "❌ ERROR: Critical upstream files were modified"
            echo "Perdu must remain completely isolated to maintain fork compatibility"
            exit 1
          fi
          
          echo "✅ Fork isolation verified - all changes are perdu-specific"
          
      - name: Run existing motia.dev tests
        run: |
          # Setup playground python environment
          pnpm -r --filter @motiadev/core exec pnpm python-setup
          cd playground
          pnpm python-setup
          
          # Run existing tests to ensure no regressions
          PATH=python_modules/bin:$PATH pnpm -r run test
          
          echo "✅ All existing motia.dev tests pass with perdu changes"

  perdu-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate perdu documentation
        run: |
          echo "📚 Validating perdu documentation completeness..."
          
          # Check that all required documentation exists
          required_files=(
            "perdu/README.md"
            "perdu/UPSTREAM_INTEGRATION_REQUIREMENTS.md"
            "perdu/PRESERVED_UPSTREAM_INFO.md"
            "perdu/plans/20250726-dbos/00-FOUNDATION/pr-00-perdu-dev-environment-setup.md"
          )
          
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "❌ Missing required documentation: $file"
              exit 1
            fi
            echo "✅ Found: $file"
          done
          
          # Validate Docker Compose files
          cd perdu
          docker compose -f docker-compose.perdu.yml config > /dev/null
          echo "✅ Perdu Docker Compose configuration is valid"
          
          # Check that scripts are executable
          if [[ ! -x "scripts/setup-perdu-dev.sh" ]]; then
            echo "❌ setup-perdu-dev.sh is not executable"
            exit 1
          fi
          
          if [[ ! -x "scripts/test-perdu-connection.sh" ]]; then
            echo "❌ test-perdu-connection.sh is not executable"
            exit 1
          fi
          
          echo "✅ All perdu documentation and scripts are properly configured"